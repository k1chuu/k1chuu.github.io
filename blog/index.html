<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse all security research posts from k1chuu">
    <title>k1chuu | Blog Archive</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Fira+Code&display=swap"
        rel="stylesheet">
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <header class="site-header">
            <div class="logo" id="site-logo">k1chuu</div>
            <div class="tagline" id="site-tagline">Just a random guy from the cloud</div>
            <nav class="nav">
                <a href="../">Home</a>
                <a href="./" class="active">Blog Archive</a>
                <a href="../about/">About</a>
            </nav>
        </header>

        <main id="main-content">
            <!-- Search + Filter Bar -->
            <div style="display:flex; flex-wrap:wrap; gap:1rem; align-items:center; margin-bottom:2.5rem">
                <input type="search" id="post-search" class="search-bar" placeholder="Search posts..."
                    style="max-width:100%">
            </div>

            <div class="tag-filter-container" id="tag-filters">
                <!-- Tag buttons will be injected here automatically by js/app.js -->
            </div>

            <!-- Posts List -->
            <div class="posts-grid" id="posts-container" data-view="archive">
                <!-- Posts will be injected here automatically by js/app.js -->
                <p style="padding: 4rem; text-align: center; color: var(--text-dim);">Initializing blog archive...
                </p>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 k1chuu</p>
        </footer>
    </div>

    <script src="../js/background.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
